name: IRIS Face Recognition
version: "0.1.0"
slug: iris_face_recognition
description: Local face recognition for Home Assistant using IRIS/InsightFace
url: https://github.com/anhnvme/facedetect
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 80
panel_icon: mdi:face-recognition
webui: http://[HOST]:[PORT:80]
ports:
  80/tcp: 8080
ports_description:
  80/tcp: IRIS web UI and API
map:
  - share:rw
  - media:rw
options:
  data_dir: /data
schema:
  data_dir: str
